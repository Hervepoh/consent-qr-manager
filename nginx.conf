# ─────────────────────────────────────────────
# Nginx – SPA React/Vite + Proxy API
# consent-qr-manager (production)
# ─────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Sécurité ────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip ────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Proxy API → serveur Express ─────────────
    # Toutes les requêtes /api/* sont redirigées vers le conteneur "server"
    location /api/ {
        proxy_pass         http://server:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Assets statiques (JS, CSS, images) ──────
    # Vite génère des fichiers avec hash → cache longue durée
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Fichiers statiques à la racine ──────────
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|webm|woff|woff2|ttf|eot|json|xml|txt)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ── Healthcheck endpoint ────────────────────
    location /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    # ── SPA fallback ────────────────────────────
    # Toutes les routes non trouvées → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Pages d'erreur ──────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
