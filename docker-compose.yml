services:

  # ══════════════════════════════════════════
  #  Serveur API Express (port 3000)
  # ══════════════════════════════════════════
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    image: consent-server:latest
    container_name: consent-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-1000}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - app-network

  # ══════════════════════════════════════════
  #  Frontend React/Vite (port 80)
  # ══════════════════════════════════════════
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: consent-frontend:latest
    container_name: consent-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge