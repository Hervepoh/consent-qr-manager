# ══════════════════════════════════════════════════════════
#  consent-qr-manager — Docker Compose Production
# ══════════════════════════════════════════════════════════

services:

  # ──────────────────────────────────────────────────────
  #  Base de données MySQL
  # ──────────────────────────────────────────────────────
  db:
    image: mysql:8.4
    container_name: consent-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "127.0.0.1:3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    security_opt:
      - no-new-privileges:true

  # ──────────────────────────────────────────────────────
  #  Serveur API Express (port 3001 interne uniquement)
  # ──────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    image: consent-server:latest
    container_name: consent-server
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_SECRET: ${ADMIN_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SERVICE: ${SMTP_SERVICE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    command: >
      sh -c "npx drizzle-kit push --config=drizzle.config.prod.js && node dist/index.js"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    security_opt:
      - no-new-privileges:true

  # ──────────────────────────────────────────────────────
  #  Frontend React/Vite servi par Nginx (port 80)
  # ──────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: consent-frontend:latest
    container_name: consent-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'
    security_opt:
      - no-new-privileges:true

# ──────────────────────────────────────────────────────
#  Volumes & Réseaux
# ──────────────────────────────────────────────────────
volumes:
  db-data:
    driver: local

networks:
  app-network:
    driver: bridge